services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: joules
      POSTGRES_PASSWORD: joules
      POSTGRES_DB: joules
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joules"]
      interval: 5s
      timeout: 5s
      retries: 5

  joules:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-8687}:${PORT:-8687}"
    environment:
      PORT: "${PORT:-8687}"
      APP_URL: ${APP_URL:-http://localhost:8687}
      DATABASE_URL: postgres://joule:joule@postgres:5432/joule?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@joules.local}
      REQUIRE_APPROVAL: ${REQUIRE_APPROVAL:-false}
      ROUTING_MODEL: ${ROUTING_MODEL:-}
      VISION_MODEL: ${VISION_MODEL:-}
      OCR_MODEL: ${OCR_MODEL:-}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL:-}
      VISION_API_KEY: ${VISION_API_KEY:-}
      VISION_BASE_URL: ${VISION_BASE_URL:-}
      OCR_API_KEY: ${OCR_API_KEY:-}
      OCR_BASE_URL: ${OCR_BASE_URL:-}
      CLASSIFIER_API_KEY: ${CLASSIFIER_API_KEY:-}
      CLASSIFIER_BASE_URL: ${CLASSIFIER_BASE_URL:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_CONTACT: ${VAPID_CONTACT:-}
      NTFY_BASE_URL: ${NTFY_BASE_URL:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
